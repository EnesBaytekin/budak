services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DB_URL=postgres://budak:budak@db:5432/budak
      - JWT_SECRET=dev-secret-change-in-production
      - REGISTRATION_OPEN=true
      - MIGRATIONS_DIR=/app/internal/db/migrations
    volumes:
      - ./whitelist.txt:/app/whitelist.txt:ro
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: budak
      POSTGRES_PASSWORD: budak
      POSTGRES_DB: budak
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port needed — services communicate via internal network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budak"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
