services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${BUDAK_CERTS_DIR:-./certs}:/certs:ro
      - caddy_data:/data
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - budak-net

  backend:
    image: enesbaytekin/budak-backend:${BUDAK_VERSION:-latest}
    environment:
      - DB_URL=postgres://${DB_USER:-budak}:${DB_PASSWORD:-budak}@db:5432/${DB_NAME:-budak}
      - JWT_SECRET=${JWT_SECRET}
      - REGISTRATION_OPEN=${REGISTRATION_OPEN:-false}
    volumes:
      - ./whitelist.txt:/app/whitelist.txt:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - budak-net

  frontend:
    image: enesbaytekin/budak-frontend:${BUDAK_VERSION:-latest}
    restart: unless-stopped
    networks:
      - budak-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-budak}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-budak}
      POSTGRES_DB: ${DB_NAME:-budak}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-budak}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - budak-net

volumes:
  pgdata:
  caddy_data:

networks:
  budak-net:
