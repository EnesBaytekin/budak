# Budak — Production Docker Compose
# This file is included in GitHub releases.
# Copy .env.example to .env and fill in your settings.
# Then run: docker compose up -d

services:
  # ─── Cloudflare Tunnel ───────────────────────────────────
  # (Optional — uncomment to use instead of direct HTTPS)
  # Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
  #
  # To use:
  #   1. Set CLOUDFLARE_TUNNEL_TOKEN in .env
  #   2. Uncomment the tunnel service below
  #   3. Comment out Caddy's "ports:" block (close 80/443)
  #
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   restart: unless-stopped
  #   networks:
  #     - budak-net

  caddy:
    image: caddy:2-alpine
    # ── Ports ──────────────────────────────────────────────
    # Direct HTTPS: leave as-is (Caddy handles TLS on 80/443)
    # Cloudflare Tunnel: comment all lines below (TLS handled by Cloudflare)
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${BUDAK_CERTS_DIR:-./certs}:/certs:ro
      - caddy_data:/data
    depends_on:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${BUDAK_CERTS_DIR:-./certs}:/certs:ro
      - caddy_data:/data
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - budak-net

  backend:
    image: enesbaytekin/budak-backend:${BUDAK_VERSION:-latest}
    environment:
      - DB_URL=postgres://${DB_USER:-budak}:${DB_PASSWORD:-budak}@db:5432/${DB_NAME:-budak}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - REGISTRATION_OPEN=${REGISTRATION_OPEN:-false}
      - WHITELIST_ENABLED=${WHITELIST_ENABLED:-false}
    volumes:
      - ./whitelist.txt:/app/whitelist.txt:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - budak-net

  frontend:
    image: enesbaytekin/budak-frontend:${BUDAK_VERSION:-latest}
    restart: unless-stopped
    networks:
      - budak-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-budak}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-budak}
      POSTGRES_DB: ${DB_NAME:-budak}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-budak}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - budak-net

volumes:
  pgdata:
  caddy_data:

networks:
  budak-net:
