name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY_IMAGE_BACKEND: imns/tudo-backend
  REGISTRY_IMAGE_FRONTEND: imns/tudo-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "version_slug=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE_BACKEND }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY_IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE_FRONTEND }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY_IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            release/docker-compose.yml
            release/.env.example
