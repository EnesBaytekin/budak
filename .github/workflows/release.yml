name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy dist for embedding
        run: cp -r frontend/dist backend/internal/web/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries (cross-platform)
        run: |
          cd backend
          for target in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64"; do
            os="${target%/*}"
            arch="${target#*/}"
            suffix=""
            [ "$os" = "windows" ] && suffix=".exe"
            echo "==> Building $os/$arch …"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -o "../budak-${os}-${arch}${suffix}" ./cmd/budak
          done

      - name: Generate release body
        run: |
          V="${{ github.ref_name }}"
          VS="${V#v}"

          cat > .github/release-body.md << EOF
          ## Budak ${VS}

          ### 🚀 Quick Deploy

          **Single binary — no Docker, no PostgreSQL, no dependencies.**

          \`\`\`bash
          # Pick your platform below, then run:
          cp .env.example .env
          sed -i "s/JWT_SECRET=.*/JWT_SECRET=\$(openssl rand -base64 32)/" .env
          ./budak-linux-amd64
          \`\`\`

          Or set it directly without a .env file:

          \`\`\`bash
          JWT_SECRET=\$(openssl rand -base64 32) ./budak-linux-amd64
          \`\`\`

          | Platform | Binary |
          |----------|--------|
          | Linux x86_64 | \`budak-linux-amd64\` |
          | Linux ARM64 | \`budak-linux-arm64\` |
          | macOS Intel | \`budak-darwin-amd64\` |
          | macOS Apple Silicon | \`budak-darwin-arm64\` |
          | Windows | \`budak-windows-amd64.exe\` |

          > Set \`PORT=9090\` to change port, \`DB_PATH=/data/budak.db\` for a custom database path.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Budak ${{ github.ref_name }}
          body_path: .github/release-body.md
          fail_on_unmatched_files: false
          files: |
            budak-linux-amd64
            budak-linux-arm64
            budak-darwin-amd64
            budak-darwin-arm64
            budak-windows-amd64.exe
            .env.example
