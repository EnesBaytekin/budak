name: Release

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_BACKEND: enesbaytekin/budak-backend
  IMAGE_FRONTEND: enesbaytekin/budak-frontend
  IMAGE_CADDY: enesbaytekin/budak-caddy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_SLUG="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_slug=$VERSION_SLUG" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Caddy
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: docker/caddy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_CADDY }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_CADDY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate version-pinned compose file
        run: |
          sed "s|\${BUDAK_VERSION:-latest}|${{ steps.meta.outputs.version }}|g" \
            release/docker-compose.yml > release/docker-compose.versioned.yml

      - name: Generate release body
        run: |
          V="${{ steps.meta.outputs.version }}"
          VS="${{ steps.meta.outputs.version_slug }}"

          echo "## Budak ${VS}" >> .github/release-body.md
          echo "" >> .github/release-body.md
          echo "### Deploy" >> .github/release-body.md
          echo "" >> .github/release-body.md
          echo "Download \`docker-compose.yml\`, \`.env.example\`, and optionally \`whitelist.txt\` to a directory." >> .github/release-body.md
          echo "" >> .github/release-body.md
          echo '1. `cp .env.example .env`' >> .github/release-body.md
          echo '2. `sed -i "s/JWT_SECRET=.*/JWT_SECRET=$(openssl rand -base64 32)/" .env`' >> .github/release-body.md
          echo '3. `sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=$(openssl rand -base64 16 | tr -dc a-zA-Z0-9)/" .env`' >> .github/release-body.md
          echo "4. Edit \`.env\` and set your \`DOMAIN\`" >> .github/release-body.md
          echo '5. `docker compose pull && docker compose up -d`' >> .github/release-body.md
          echo "6. Open the site, register your admin account, set \`REGISTRATION_OPEN=false\`, restart" >> .github/release-body.md
          echo "" >> .github/release-body.md
          echo "> 💡 All config files (Caddyfile, whitelist.txt) are built into the images with sensible defaults." >> .github/release-body.md
          echo "> To customize, create the file and uncomment the related mount in \`docker-compose.yml\`." >> .github/release-body.md
          echo "" >> .github/release-body.md
          echo "> 💡 Also works on ARM (Raspberry Pi, etc.) — images are built for both amd64 and arm64." >> .github/release-body.md
          echo "" >> .github/release-body.md
          echo "### Images" >> .github/release-body.md
          echo "- \`enesbaytekin/budak-backend:${V}\`" >> .github/release-body.md
          echo "- \`enesbaytekin/budak-frontend:${V}\`" >> .github/release-body.md
          echo "- \`enesbaytekin/budak-caddy:${V}\`" >> .github/release-body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Budak ${{ steps.meta.outputs.version_slug }}
          body_path: .github/release-body.md
          fail_on_unmatched_files: false
          files: |
            release/docker-compose.yml
            release/docker-compose.versioned.yml
            release/.env.example
            whitelist.txt
