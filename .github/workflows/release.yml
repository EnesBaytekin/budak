name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          VS="${GITHUB_REF_NAME#v}"
          echo "version=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          echo "version_slug=$VS" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy dist for embedding
        run: cp -r frontend/dist backend/internal/web/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries (cross-platform)
        env:
          GOTOOLCHAIN: auto
          GONOSUMCHECK: "*"
          GONOSUMDB: "*"
          GOPROXY: "https://proxy.golang.org,direct"
        run: |
          VS="${{ steps.meta.outputs.version_slug }}"
          cd backend
          for target in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64"; do
            os="${target%/*}"
            arch="${target#*/}"
            suffix=""
            [ "$os" = "windows" ] && suffix=".exe"
            echo "==> Building $os/$arch тАж"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
              -ldflags="-X 'main.Version=v${VS}'" \
              -o "../budak-v${VS}-${os}-${arch}${suffix}" ./cmd/budak
          done

      - name: Generate release body
        run: |
          V="${{ steps.meta.outputs.version }}"
          VS="${{ steps.meta.outputs.version_slug }}"

          cat > .github/release-body.md << RELBODY
          ## Budak ${VS}

          ### ЁЯЪА One-Click Deploy

          **Single binary тАФ SQLite, embedded frontend, zero dependencies.**

          Copy the command for your platform and paste it on your server:

          <details>
          <summary><b>ЁЯРз Linux x86_64</b></summary>

          \`\`\`bash
          V=${V}; mkdir -p budak-\${V#v} && cd budak-\${V#v} && \
          wget -q "https://github.com/EnesBaytekin/budak/releases/download/\${V}/budak-${VS}-linux-amd64" -O budak && \
          chmod +x budak && \
          ( [ -f .env ] || { echo "PORT=8080" > .env; echo "JWT_SECRET=\$(openssl rand -base64 32)" >> .env; echo "REGISTRATION_OPEN=true" >> .env; } ) && \
          echo "тЬЕ Ready. Run: ./budak"
          \`\`\`
          </details>

          <details>
          <summary><b>ЁЯНУ Linux ARM64</b></summary>

          \`\`\`bash
          V=${V}; mkdir -p budak-\${V#v} && cd budak-\${V#v} && \
          wget -q "https://github.com/EnesBaytekin/budak/releases/download/\${V}/budak-${VS}-linux-arm64" -O budak && \
          chmod +x budak && \
          ( [ -f .env ] || { echo "PORT=8080" > .env; echo "JWT_SECRET=\$(openssl rand -base64 32)" >> .env; echo "REGISTRATION_OPEN=true" >> .env; } ) && \
          echo "тЬЕ Ready. Run: ./budak"
          \`\`\`
          </details>

          <details>
          <summary><b>ЁЯНО macOS Intel</b></summary>

          \`\`\`bash
          V=${V}; mkdir -p budak-\${V#v} && cd budak-\${V#v} && \
          curl -sL "https://github.com/EnesBaytekin/budak/releases/download/\${V}/budak-${VS}-darwin-amd64" -o budak && \
          chmod +x budak && \
          ( [ -f .env ] || { echo "PORT=8080" > .env; echo "JWT_SECRET=\$(openssl rand -base64 32)" >> .env; echo "REGISTRATION_OPEN=true" >> .env; } ) && \
          echo "тЬЕ Ready. Run: ./budak"
          \`\`\`
          </details>

          <details>
          <summary><b>ЁЯНП macOS Apple Silicon</b></summary>

          \`\`\`bash
          V=${V}; mkdir -p budak-\${V#v} && cd budak-\${V#v} && \
          curl -sL "https://github.com/EnesBaytekin/budak/releases/download/\${V}/budak-${VS}-darwin-arm64" -o budak && \
          chmod +x budak && \
          ( [ -f .env ] || { echo "PORT=8080" > .env; echo "JWT_SECRET=\$(openssl rand -base64 32)" >> .env; echo "REGISTRATION_OPEN=true" >> .env; } ) && \
          echo "тЬЕ Ready. Run: ./budak"
          \`\`\`
          </details>

          <details>
          <summary><b>ЁЯкЯ Windows</b> (PowerShell)</summary>

          \`\`\`powershell
          Invoke-WebRequest -Uri "https://github.com/EnesBaytekin/budak/releases/download/${V}/budak-${VS}-windows-amd64.exe" -OutFile budak.exe
          if (-not (Test-Path .env)) { Set-Content .env "PORT=8080\nJWT_SECRET=change-me\nREGISTRATION_OPEN=true" }
          Write-Host "Run: ./budak.exe"
          \`\`\`
          </details>

          ### ЁЯФД Update Existing Installation

          Already running? Replace the binary without touching your data:

          \`\`\`bash
          # Detects your arch and downloads the right binary
          pkill budak 2>/dev/null; sleep 1
          PLAT=\$(uname -m | sed 's/x86_64/linux-amd64/;s/aarch64/linux-arm64/')
          wget -q "https://github.com/EnesBaytekin/budak/releases/download/${V}/budak-${VS}-\${PLAT}" -O budak
          chmod +x budak && ./budak
          \`\`\`

          > ЁЯТб Your \`.env\` and \`budak.db\` are untouched тАФ only the binary changes.

          ### ЁЯФН Check Version

          \`\`\`bash
          ./budak version
          \`\`\`
          RELBODY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Budak ${{ steps.meta.outputs.version }}
          body_path: .github/release-body.md
          fail_on_unmatched_files: false
          files: |
            budak-${{ steps.meta.outputs.version_slug }}-linux-amd64
            budak-${{ steps.meta.outputs.version_slug }}-linux-arm64
            budak-${{ steps.meta.outputs.version_slug }}-darwin-amd64
            budak-${{ steps.meta.outputs.version_slug }}-darwin-arm64
            budak-${{ steps.meta.outputs.version_slug }}-windows-amd64.exe
            .env.example
