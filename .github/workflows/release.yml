name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          VS="${GITHUB_REF_NAME#v}"
          echo "version=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          echo "version_slug=$VS" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy dist for embedding
        run: cp -r frontend/dist backend/internal/web/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Build binaries (cross-platform)
        env:
          GOTOOLCHAIN: auto
          GONOSUMCHECK: "*"
          GONOSUMDB: "*"
          GOPROXY: "https://proxy.golang.org,direct"
        run: |
          go version
          VS="${{ steps.meta.outputs.version_slug }}"
          cd backend
          for target in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64"; do
            os="${target%/*}"
            arch="${target#*/}"
            suffix=""
            [ "$os" = "windows" ] && suffix=".exe"
            echo "==> Building $os/$arch …"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
              -ldflags="-X 'main.Version=v${VS}'" \
              -o "../budak-v${VS}-${os}-${arch}${suffix}" ./cmd/budak
          done
          echo "=== Release files ==="
          ls -lh ../budak-v*

      - name: Generate release body
        run: python3 .github/scripts/gen-release-body.py "${{ steps.meta.outputs.version }}" .github/release-body.md
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Budak ${{ steps.meta.outputs.version }}
          body_path: .github/release-body.md
          fail_on_unmatched_files: false
          files: |
            budak-v${{ steps.meta.outputs.version_slug }}-linux-amd64
            budak-v${{ steps.meta.outputs.version_slug }}-linux-arm64
            budak-v${{ steps.meta.outputs.version_slug }}-darwin-amd64
            budak-v${{ steps.meta.outputs.version_slug }}-darwin-arm64
            budak-v${{ steps.meta.outputs.version_slug }}-windows-amd64.exe
            .env.example
