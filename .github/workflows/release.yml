name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          VS="${GITHUB_REF_NAME#v}"
          echo "version=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          echo "version_slug=$VS" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy dist for embedding
        run: cp -r frontend/dist backend/internal/web/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Build binaries (cross-platform)
        env:
          GOTOOLCHAIN: auto
          GONOSUMCHECK: "*"
          GONOSUMDB: "*"
          GOPROXY: "https://proxy.golang.org,direct"
        run: |
          go version
          VS="${{ steps.meta.outputs.version_slug }}"
          cd backend
          for target in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64"; do
            os="${target%/*}"
            arch="${target#*/}"
            suffix=""
            [ "$os" = "windows" ] && suffix=".exe"
            echo "==> Building $os/$arch тАж"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
              -ldflags="-X 'main.Version=v${VS}'" \
              -o "../budak-v${VS}-${os}-${arch}${suffix}" ./cmd/budak
          done
          echo "=== Release files ==="
          ls -lh ../budak-v*

      - name: Generate release body
        run: |
          V="${{ steps.meta.outputs.version }}"
          VS="${{ steps.meta.outputs.version_slug }}"

          cat > .github/release-body.md << RELBODY
          ## Budak ${VS}

          **Single binary тАФ SQLite, embedded frontend, zero dependencies.**

          Copy the command for your platform and paste it on your server.
          Run it for both **first install** and **updates** тАФ same command.

          <details>
          <summary><b>ЁЯРз Linux x86_64</b></summary>

          \`\`\`bash
          V=${V}; N="budak-${V}-linux-amd64"; \\
          [ -f .env ] || { echo "PORT=8080" > .env; echo "JWT_SECRET=\$(openssl rand -base64 32)" >> .env; echo "REGISTRATION_OPEN=true" >> .env; } && \\
          wget -q "https://github.com/EnesBaytekin/budak/releases/download/\${V}/\${N}" && \\
          chmod +x "\${N}" && echo "тЬЕ Ready" && sudo systemctl restart budak 2>/dev/null || ./"\${N}"
          \`\`\`
          </details>

          <details>
          <summary><b>ЁЯНУ Linux ARM64</b></summary>

          \`\`\`bash
          V=${V}; N="budak-${V}-linux-arm64"; \\
          [ -f .env ] || { echo "PORT=8080" > .env; echo "JWT_SECRET=\$(openssl rand -base64 32)" >> .env; echo "REGISTRATION_OPEN=true" >> .env; } && \\
          wget -q "https://github.com/EnesBaytekin/budak/releases/download/\${V}/\${N}" && \\
          chmod +x "\${N}" && echo "тЬЕ Ready" && sudo systemctl restart budak 2>/dev/null || ./"\${N}"
          \`\`\`
          </details>

          <details>
          <summary><b>ЁЯНО macOS Intel</b></summary>

          \`\`\`bash
          V=${V}; N="budak-${V}-darwin-amd64"; \\
          [ -f .env ] || { echo "PORT=8080" > .env; echo "JWT_SECRET=\$(openssl rand -base64 32)" >> .env; echo "REGISTRATION_OPEN=true" >> .env; } && \\
          curl -sL "https://github.com/EnesBaytekin/budak/releases/download/\${V}/\${N}" -o "\${N}" && \\
          chmod +x "\${N}" && echo "тЬЕ Ready" && ./"\${N}"
          \`\`\`
          </details>

          <details>
          <summary><b>ЁЯНП macOS Apple Silicon</b></summary>

          \`\`\`bash
          V=${V}; N="budak-${V}-darwin-arm64"; \\
          [ -f .env ] || { echo "PORT=8080" > .env; echo "JWT_SECRET=\$(openssl rand -base64 32)" >> .env; echo "REGISTRATION_OPEN=true" >> .env; } && \\
          curl -sL "https://github.com/EnesBaytekin/budak/releases/download/\${V}/\${N}" -o "\${N}" && \\
          chmod +x "\${N}" && echo "тЬЕ Ready" && ./"\${N}"
          \`\`\`
          </details>

          <details>
          <summary><b>ЁЯкЯ Windows</b> (PowerShell)</summary>

          \`\`\`powershell
          \$v = "${V}"; \$n = "budak-v${VS}-windows-amd64.exe"; \\
          if (-not (Test-Path .env)) { Set-Content .env "PORT=8080`nJWT_SECRET=$(openssl rand -base64 32)`nREGISTRATION_OPEN=true" }; \\
          Invoke-WebRequest -Uri "https://github.com/EnesBaytekin/budak/releases/download/\$v/\$n" -OutFile \$n; \\
          Write-Host "тЬЕ Run: ./\$n"
          \`\`\`
          </details>

          > ЁЯТб \`.env\` and \`.db\` files are never overwritten. Only the binary is downloaded.

          ### ЁЯФН Check Version

          \`\`\`bash
          ./budak-${VS}-linux-arm64 version
          \`\`\`
          RELBODY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Budak ${{ steps.meta.outputs.version }}
          body_path: .github/release-body.md
          fail_on_unmatched_files: false
          files: |
            budak-v${{ steps.meta.outputs.version_slug }}-linux-amd64
            budak-v${{ steps.meta.outputs.version_slug }}-linux-arm64
            budak-v${{ steps.meta.outputs.version_slug }}-darwin-amd64
            budak-v${{ steps.meta.outputs.version_slug }}-darwin-arm64
            budak-v${{ steps.meta.outputs.version_slug }}-windows-amd64.exe
            .env.example
