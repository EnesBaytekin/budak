name: Release

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_BACKEND: enesbaytekin/budak-backend
  IMAGE_FRONTEND: enesbaytekin/budak-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_SLUG="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_slug=$VERSION_SLUG" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate version-pinned compose file
        run: |
          sed "s|\${BUDAK_VERSION:-latest}|${{ steps.meta.outputs.version }}|g" \
            release/docker-compose.yml > release/docker-compose.versioned.yml

      - name: Create deployment archive
        run: |
          VS="${{ steps.meta.outputs.version_slug }}"
          mkdir -p "budak-${VS}"
          cp docker-compose.yml "budak-${VS}/"
          cp release/docker-compose.versioned.yml "budak-${VS}/docker-compose.yml"
          cp Caddyfile whitelist.txt "budak-${VS}/"
          sed "s/BUDAK_VERSION=latest/BUDAK_VERSION=${VS}/" .env.example > "budak-${VS}/.env.example"
          tar czf "budak-${VS}.tar.gz" "budak-${VS}/"

      - name: Generate release body
        run: |
          V="${{ steps.meta.outputs.version }}"
          VS="${{ steps.meta.outputs.version_slug }}"

          cat > .github/release-body.md << EOF
          ## Budak ${VS}

          ### 🚀 One-Command Deploy (Direct HTTPS)

          Download **\`budak-${VS}.tar.gz\`** below, then:

          \`\`\`bash
          tar xzf budak-${VS}.tar.gz
          cd budak-${VS}
          cp .env.example .env
          sed -i "s/JWT_SECRET=.*/JWT_SECRET=\$(openssl rand -base64 32)/" .env
          sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=\$(openssl rand -base64 16 | tr -dc a-zA-Z0-9)/" .env
          echo "Enter your domain (e.g. budak.example.com):" && read domain && [ -n "\$domain" ] && sed -i "s/DOMAIN=.*/DOMAIN=\$domain/" .env
          docker compose pull && docker compose up -d
          \`\`\`

          After deploy, open the site, register your admin account, set \`REGISTRATION_OPEN=false\` in \`.env\`, and restart.

          ### ☁️ Cloudflare Tunnel (Alternative)

          If port 80/443 is already in use, or you prefer tunneling:

          1. Follow the tunnel setup steps in the README
          2. In \`docker-compose.yml\`: uncomment the \`tunnel\` service, comment out Caddy's \`ports:\`
          3. In Cloudflare dashboard, set tunnel **Public Hostname** → \`http://caddy:80\`
          4. Run:
          \`\`\`bash
          docker compose pull && docker compose up -d
          \`\`\`

          > 💡 Also works on ARM (Raspberry Pi, etc.) — images are built for both amd64 and arm64.

          ### Images
          - \`enesbaytekin/budak-backend:${V}\`
          - \`enesbaytekin/budak-frontend:${V}\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Budak ${{ steps.meta.outputs.version_slug }}
          body_path: .github/release-body.md
          fail_on_unmatched_files: false
          files: |
            budak-${{ steps.meta.outputs.version_slug }}.tar.gz
            release/.env.example
            Caddyfile
            whitelist.txt
